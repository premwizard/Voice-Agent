apiVersion: v1
kind: Service
metadata:
  name: ai-platform-backend
  namespace: ai-platform
  labels:
    app: backend
spec:
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
  selector:
    app: backend
---
apiVersion: v1
kind: Service
metadata:
  name: ai-platform-frontend
  namespace: ai-platform
  labels:
    app: frontend
spec:
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
  selector:
    app: frontend
